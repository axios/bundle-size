name: Feature Request
description: Suggest an improvement or new capability for the bundle-size action.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the action inputs, outputs, report changes, or PR behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workarounds or different designs you considered.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Inputs and configuration
        - Tarball handling
        - Path safety
        - Gzip comparison report
        - Pull request comments
        - Documentation
        - Other
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, related tools, or links that clarify the request.
    validations:
      required: false
