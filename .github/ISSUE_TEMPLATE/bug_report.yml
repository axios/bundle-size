name: Bug Report
description: Report a problem with bundle-size comparison or action runtime behavior.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include secrets, tokens, or private artifact contents.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior you saw and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow snippet
      description: Include the relevant action step and permissions, with secrets redacted.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: inputs
    attributes:
      label: Action inputs
      description: Include values such as `path`, `package-name`, `release-stream`, `files`, `output-file`, and `markdown-output-file`.
      render: yaml
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste the smallest useful log excerpt.
      render: text
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Action version or ref
      placeholder: main, v1, commit SHA, or local ./ usage
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, environment details, or notes about tarball contents and compared files.
    validations:
      required: false
